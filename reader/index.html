<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reader</title>
<style>
  :root {
    --bg: #0d0c11;
    --panel: #16151d;
    --panel-2: #201d2a;
    --border: #322e40;
    --text: #f4f1f7;
    --muted: #948da8;
    --accent: #2ee6c6;
    --accent-dim: #1da891;
    --red: #ff5b5b;
    --radius: 10px;
    font-size: 15px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    line-height: 1.5; min-height: 100vh;
  }
  .wrap { max-width: 780px; margin: 0 auto; padding: 24px 20px 80px; }
  header { display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 16px; }
  h1 { font-size: 1.6rem; font-weight: 800; letter-spacing: 0.02em; color: var(--accent); text-transform: uppercase; }
  h1 .count { font-size: 1rem; color: var(--muted); font-weight: 600; margin-left: 8px; text-transform: none; }
  .header-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  button {
    background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 7px 14px; font-size: 0.9rem; cursor: pointer;
    font-family: inherit; transition: background 0.15s, border-color 0.15s;
  }
  button:hover { background: var(--border); }
  button.primary { background: var(--accent-dim); border-color: var(--accent-dim); color: #fff; }
  button.primary:hover { background: var(--accent); border-color: var(--accent); color: #10201c; }
  button.danger:hover { background: var(--red); border-color: var(--red); color: #fff; }
  button:disabled { opacity: 0.5; cursor: default; }

  .meta-line { color: var(--muted); font-size: 0.82rem; margin-bottom: 14px; }

  .controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 14px; }
  .tabs { display: flex; gap: 4px; }
  .tab { padding: 6px 13px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; color: var(--muted); border: 1px solid transparent; background: none; }
  .tab:hover { color: var(--text); background: var(--panel); }
  .tab.active { background: var(--panel-2); color: var(--accent); border-color: var(--border); }
  select {
    background: var(--panel); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 7px 10px; font-size: 0.9rem; font-family: inherit;
    max-width: 300px;
  }
  select:focus { outline: none; border-color: var(--accent-dim); }

  .item-list { display: flex; flex-direction: column; gap: 6px; }
  .item {
    display: flex; align-items: flex-start; gap: 10px;
    background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 11px 14px;
  }
  .item.read { opacity: 0.55; }
  .dot {
    flex: none; width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent); margin-top: 8px;
  }
  .item.read .dot { background: var(--border); }
  .item-main { flex: 1; min-width: 0; }
  .item-title { color: var(--text); text-decoration: none; font-weight: 600; }
  .item-title:hover { color: var(--accent); }
  .item-meta { color: var(--muted); font-size: 0.8rem; margin-top: 2px; }
  .toggle {
    flex: none; background: none; border: none; padding: 4px 6px;
    color: var(--muted); font-size: 1rem;
  }
  .toggle:hover { color: var(--accent); background: none; }

  .empty { color: var(--muted); text-align: center; padding: 40px 0; }

  /* Manage feeds modal */
  .modal-bg {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    z-index: 10; align-items: flex-start; justify-content: center; padding: 40px 16px;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius);
    max-width: 560px; width: 100%; max-height: 80vh; overflow-y: auto; padding: 20px;
  }
  .modal h2 { font-size: 1.1rem; margin-bottom: 12px; color: var(--accent); }
  .add-row { display: flex; gap: 8px; margin-bottom: 16px; }
  .add-row input {
    flex: 1; background: var(--bg); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 12px; font-size: 0.9rem; font-family: inherit;
  }
  .add-row input:focus { outline: none; border-color: var(--accent-dim); }
  .feed-row {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    padding: 8px 4px; border-bottom: 1px solid var(--border);
  }
  .feed-row:last-child { border-bottom: none; }
  .feed-name { font-size: 0.92rem; }
  .feed-err { color: var(--red); font-size: 0.78rem; }
  .feed-unread { color: var(--muted); font-size: 0.8rem; margin-left: 6px; }
  .modal-close { margin-top: 14px; width: 100%; }
  .msg { font-size: 0.85rem; margin-bottom: 10px; }
  .msg.err { color: var(--red); }
  .msg.ok { color: var(--accent); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Reader<span class="count" id="unreadCount"></span></h1>
    <div class="header-actions">
      <button id="refreshBtn" onclick="doRefresh()">Refresh</button>
      <button onclick="openModal()">Feeds</button>
      <button class="primary" onclick="markAllRead()">Mark all read</button>
    </div>
  </header>
  <div class="meta-line" id="metaLine">Updates daily on open</div>

  <div class="controls">
    <div class="tabs">
      <button class="tab active" id="tabUnread" onclick="setView('unread')">Unread</button>
      <button class="tab" id="tabAll" onclick="setView('all')">All</button>
    </div>
    <select id="feedFilter" onchange="render()">
      <option value="">All feeds</option>
    </select>
  </div>

  <div class="item-list" id="itemList"></div>
  <div class="empty" id="empty" style="display:none">Nothing here — all caught up.</div>
</div>

<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2>Feeds</h2>
    <div class="msg" id="feedMsg"></div>
    <div class="add-row">
      <input type="url" id="addUrl" placeholder="https://example.substack.com/feed"
             onkeydown="if(event.key==='Enter')addFeed()">
      <button class="primary" onclick="addFeed()">Add</button>
    </div>
    <div id="feedList"></div>
    <button class="modal-close" onclick="closeModal()">Close</button>
  </div>
</div>

<script>
let feeds = [], items = [], view = 'unread', refreshing = false, pollTimer = null;

async function api(path, body) {
  const opts = body !== undefined
    ? { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) }
    : {};
  const r = await fetch(path, opts);
  const data = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(data.error || r.statusText);
  return data;
}

async function loadState() {
  const s = await api('state');
  feeds = s.feeds; items = s.items;
  refreshing = s.refreshing;
  if (refreshing) startPolling(); else stopPolling();
  render();
  renderMeta(s.last_refresh);
  renderFeedFilter();
  if (document.getElementById('modalBg').classList.contains('open')) renderFeedList();
}

function renderMeta(lastRefresh) {
  const el = document.getElementById('metaLine');
  let txt = 'Updates daily on open';
  if (refreshing) txt += ' · refreshing now…';
  else if (lastRefresh) {
    const d = new Date(lastRefresh);
    txt += ` · last updated ${d.toLocaleDateString('en-NZ', { weekday: 'short', day: 'numeric', month: 'short' })} ${d.toLocaleTimeString('en-NZ', { hour: 'numeric', minute: '2-digit' })}`;
  }
  el.textContent = txt;
  document.getElementById('refreshBtn').disabled = refreshing;
  document.getElementById('refreshBtn').textContent = refreshing ? 'Refreshing…' : 'Refresh';
}

function feedName(url) {
  const f = feeds.find(f => f.url === url);
  return f ? f.name : url;
}

function renderFeedFilter() {
  const sel = document.getElementById('feedFilter');
  const current = sel.value;
  const unreadBy = {};
  items.forEach(i => { if (!i.read) unreadBy[i.feed] = (unreadBy[i.feed] || 0) + 1; });
  sel.innerHTML = '<option value="">All feeds</option>' +
    [...feeds].sort((a, b) => a.name.localeCompare(b.name)).map(f =>
      `<option value="${encodeURIComponent(f.url)}">${esc(f.name)}${unreadBy[f.url] ? ' (' + unreadBy[f.url] + ')' : ''}</option>`
    ).join('');
  sel.value = current;
}

function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function visibleItems() {
  const feedSel = document.getElementById('feedFilter').value;
  const feedUrl = feedSel ? decodeURIComponent(feedSel) : null;
  return items.filter(i =>
    (view === 'all' || !i.read) && (!feedUrl || i.feed === feedUrl));
}

function render() {
  const list = document.getElementById('itemList');
  const vis = visibleItems();
  const unread = items.filter(i => !i.read).length;
  document.getElementById('unreadCount').textContent = unread ? unread + ' unread' : '';
  document.getElementById('tabUnread').classList.toggle('active', view === 'unread');
  document.getElementById('tabAll').classList.toggle('active', view === 'all');
  document.getElementById('empty').style.display = vis.length ? 'none' : 'block';
  list.innerHTML = vis.slice(0, 300).map(i => {
    const d = i.date ? new Date(i.date).toLocaleDateString('en-NZ', { day: 'numeric', month: 'short' }) : '';
    return `<div class="item ${i.read ? 'read' : ''}" data-id="${esc(i.id)}">
      <div class="dot"></div>
      <div class="item-main">
        <a class="item-title" href="${esc(i.link)}" target="_blank" rel="noopener"
           onclick="markRead('${esc(encodeURIComponent(i.id))}', true)">${esc(i.title)}</a>
        <div class="item-meta">${esc(feedName(i.feed))}${d ? ' · ' + d : ''}</div>
      </div>
      <button class="toggle" title="toggle read"
              onclick="markRead('${esc(encodeURIComponent(i.id))}', ${i.read ? 'false' : 'true'})">${i.read ? '↺' : '✓'}</button>
    </div>`;
  }).join('');
}

async function markRead(encId, read) {
  const id = decodeURIComponent(encId);
  const item = items.find(i => i.id === id);
  if (item) { item.read = read; render(); renderFeedFilter(); }
  try { await api('read', { ids: [id], read }); } catch (e) { loadState(); }
}

async function markAllRead() {
  const feedSel = document.getElementById('feedFilter').value;
  const feedUrl = feedSel ? decodeURIComponent(feedSel) : null;
  items.forEach(i => { if (!feedUrl || i.feed === feedUrl) i.read = true; });
  render(); renderFeedFilter();
  try { await api('read-all', { feed: feedUrl }); } catch (e) { loadState(); }
}

function setView(v) { view = v; render(); }

async function doRefresh() {
  await api('refresh', {});
  refreshing = true;
  renderMeta(null);
  startPolling();
}

function startPolling() {
  if (!pollTimer) pollTimer = setInterval(loadState, 3000);
}
function stopPolling() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

/* Feeds modal */
function openModal() {
  document.getElementById('feedMsg').textContent = '';
  renderFeedList();
  document.getElementById('modalBg').classList.add('open');
}
function closeModal() { document.getElementById('modalBg').classList.remove('open'); }

function renderFeedList() {
  const unreadBy = {};
  items.forEach(i => { if (!i.read) unreadBy[i.feed] = (unreadBy[i.feed] || 0) + 1; });
  document.getElementById('feedList').innerHTML =
    [...feeds].sort((a, b) => a.name.localeCompare(b.name)).map(f =>
      `<div class="feed-row">
        <div>
          <span class="feed-name">${esc(f.name)}</span>
          ${unreadBy[f.url] ? `<span class="feed-unread">${unreadBy[f.url]} unread</span>` : ''}
          ${f.error ? `<div class="feed-err">feed error: ${esc(f.error)}</div>` : ''}
        </div>
        <button class="danger" onclick="removeFeed('${esc(encodeURIComponent(f.url))}')">Remove</button>
      </div>`
    ).join('');
}

async function addFeed() {
  const input = document.getElementById('addUrl');
  const msg = document.getElementById('feedMsg');
  const url = input.value.trim();
  if (!url) return;
  msg.className = 'msg'; msg.textContent = 'Checking feed…';
  try {
    const r = await api('feeds/add', { url });
    msg.className = 'msg ok'; msg.textContent = `Subscribed to ${r.name}`;
    input.value = '';
    await loadState();
  } catch (e) {
    msg.className = 'msg err'; msg.textContent = e.message;
  }
}

async function removeFeed(encUrl) {
  const url = decodeURIComponent(encUrl);
  if (!confirm(`Unsubscribe from ${feedName(url)}? Its items will be removed.`)) return;
  await api('feeds/remove', { url });
  await loadState();
}

async function init() {
  await loadState();
  try {
    const r = await api('refresh-stale', {});
    if (r.started) { refreshing = true; renderMeta(null); startPolling(); }
  } catch (e) { /* older server without refresh-stale — daily refresh needs the add-on update */ }
}
init();
</script>
</body>
</html>
