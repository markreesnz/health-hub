name: The Inner Work
slug: journal
version: "1.0.0"
description: Journal — The Inner Work. Entries, lenses, and AI reflections; stored in the browser.
arch:
  - aarch64
  - amd64
init: false
boot: auto
startup: services
watchdog: "tcp://[HOST]:[PORT:8770]"
ports:
  "8770/tcp": 8770
ports_description:
  "8770/tcp": Journal
# Remote access through Home Assistant (Nabu Casa, behind your HA login).
ingress: true
ingress_port: 8770
panel_icon: mdi:feather
panel_title: Journal
# share:rw — hold the GitHub-pulled copy so edits need only an add-on RESTART.
map:
  - "share:rw"
