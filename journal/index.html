<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#12100e">
<title>The Inner Work</title>
<style>
  :root { --bg:#12100e; --ink:#e9e2d4; --dim:#8a8275; --dim2:#6b6459; --line:#2a2620; --accent:#c9a879; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; min-height:100%; }
  body {
    background:var(--bg); color:var(--ink);
    font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
    line-height:1.6; font-size:18px;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    -webkit-text-size-adjust:100%;
  }
  .wrap { max-width:40em; margin:0 auto; padding:22px 20px 80px; }

  /* top bar */
  header { display:flex; align-items:baseline; justify-content:space-between; margin:8px 0 26px; }
  .brand { font-size:15px; letter-spacing:.16em; text-transform:uppercase; color:var(--dim); font-weight:400; }
  .tools { display:flex; gap:18px; }
  .tools button { background:none; border:none; color:var(--dim); font-family:inherit; font-size:15px; cursor:pointer; padding:0; letter-spacing:.04em; transition:color .3s; }
  .tools button:hover { color:var(--ink); }

  /* entry list */
  .entry-row { padding:16px 0; border-bottom:1px solid var(--line); cursor:pointer; }
  .entry-row:first-child { border-top:1px solid var(--line); }
  .entry-row .d { font-size:13px; letter-spacing:.08em; text-transform:uppercase; color:var(--dim2); }
  .entry-row .t { font-size:21px; margin:2px 0 3px; }
  .entry-row .s { color:var(--dim); font-size:15px; line-height:1.5;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .lenspill { font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--accent); opacity:.8; }

  /* reading */
  .back { background:none; border:none; color:var(--dim); font-family:inherit; font-size:15px; cursor:pointer; padding:0; margin-bottom:22px; letter-spacing:.04em; }
  .back:hover { color:var(--ink); }
  .read .d { font-size:13px; letter-spacing:.09em; text-transform:uppercase; color:var(--dim2); }
  .read h1 { font-size:27px; font-weight:400; margin:4px 0 18px; line-height:1.25; }
  .read .prompt { color:var(--dim); font-style:italic; border-left:2px solid var(--line); padding-left:16px; margin:0 0 22px; font-size:17px; }
  .read .body p { margin:0 0 1.1em; }
  .read .actions { display:flex; gap:22px; margin:34px 0 10px; padding-top:20px; border-top:1px solid var(--line); }
  .read .actions button { background:none; border:none; color:var(--dim); font-family:inherit; font-size:15px; letter-spacing:.05em; cursor:pointer; padding:0; transition:color .3s; }
  .read .actions button:hover { color:var(--ink); }
  .read .actions .spacer { flex:1; }

  /* reflection panel */
  .refl { margin-top:26px; padding-top:24px; border-top:1px solid var(--line); }
  .refl .who { font-size:12px; letter-spacing:.18em; text-transform:uppercase; color:var(--accent); margin-bottom:14px; }
  .refl .md { color:#ded7c8; }
  .refl .md h3 { font-size:15px; letter-spacing:.14em; text-transform:uppercase; color:var(--accent); font-weight:400; margin:26px 0 8px; }
  .refl .md .label { font-size:13px; letter-spacing:.16em; text-transform:uppercase; color:var(--dim); margin:22px 0 6px; }
  .refl .md p { margin:0 0 1em; }
  .refl .md strong { color:var(--ink); }
  .caret::after { content:"▍"; color:var(--accent); animation:blink 1s steps(1) infinite; }
  @keyframes blink { 50% { opacity:0; } }

  /* compose */
  .compose .promptbar { display:flex; align-items:center; gap:14px; margin-bottom:14px; }
  .compose .promptbar .p { flex:1; color:var(--dim); font-style:italic; font-size:16px; min-height:1.4em; }
  .compose .draw { background:none; border:1px solid var(--line); color:var(--dim); font-family:inherit; font-size:13px; letter-spacing:.06em; padding:6px 12px; border-radius:999px; cursor:pointer; white-space:nowrap; }
  .compose .draw:hover { color:var(--ink); border-color:var(--dim); }
  .compose select, .compose input.title {
    background:#1a1712; border:1px solid var(--line); color:var(--ink); font-family:inherit;
    font-size:15px; padding:8px 10px; border-radius:8px; margin-bottom:12px; width:100%; }
  textarea {
    width:100%; min-height:46vh; background:transparent; border:none; color:var(--ink);
    font-family:inherit; font-size:19px; line-height:1.6; resize:vertical; outline:none; }
  textarea::placeholder { color:var(--dim2); }
  .compose .row { display:flex; gap:16px; margin-top:16px; }
  .btn { background:none; border:1px solid var(--line); color:var(--ink); font-family:inherit; font-size:15px;
    letter-spacing:.04em; padding:9px 20px; border-radius:999px; cursor:pointer; transition:border-color .3s; }
  .btn:hover { border-color:var(--dim); }
  .btn.ghost { color:var(--dim); border:none; }

  /* modal */
  .modal { position:fixed; inset:0; background:rgba(8,7,6,.82); display:none; align-items:center; justify-content:center; padding:24px; z-index:50; }
  .modal.on { display:flex; }
  .modal .card { background:#17140f; border:1px solid var(--line); border-radius:14px; padding:24px; max-width:30em; width:100%; }
  .modal h2 { font-size:18px; font-weight:400; margin:0 0 6px; }
  .modal p { color:var(--dim); font-size:15px; margin:0 0 16px; }
  .modal input { width:100%; background:#0f0d0a; border:1px solid var(--line); color:var(--ink); font-family:inherit; font-size:15px; padding:10px; border-radius:8px; margin-bottom:16px; }
  .modal .row { display:flex; gap:12px; justify-content:flex-end; }

  .empty { color:var(--dim); text-align:center; padding:40px 0; font-style:italic; }
  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#241f18; color:var(--ink); padding:9px 18px; border-radius:999px; font-size:14px; opacity:0; transition:opacity .3s; pointer-events:none; z-index:60; }
  .toast.on { opacity:1; }
  a { color:var(--accent); }

  /* landing — open on a single quiet stillness quote, links pinned at the bottom */
  .land { min-height:74vh; display:flex; align-items:center; justify-content:center; padding:8vw 2vw 2vw; }
  .landquote { max-width:22em; text-align:center; font-size:clamp(1.4rem, 3.4vw + 1rem, 2.15rem); line-height:1.42; color:var(--ink); transition:opacity 1.2s ease; }
  .landquote.fade { opacity:0; }
  .landbar { position:fixed; left:0; right:0; bottom:calc(1.4em + env(safe-area-inset-bottom)); display:flex; justify-content:center; flex-wrap:wrap; gap:1.8em; padding:0 12px; font-size:.82rem; letter-spacing:.2em; text-transform:lowercase; z-index:5; }
  .landbar button { background:none; border:none; color:var(--dim); font-family:inherit; cursor:pointer; padding:0; letter-spacing:.2em; transition:color .3s; }
  .landbar button:hover { color:var(--ink); }

  /* entries list header */
  .listhead { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
  .listhead button { background:none; border:none; color:var(--dim); font-family:inherit; font-size:15px; letter-spacing:.05em; cursor:pointer; padding:0; }
  .listhead button:hover { color:var(--ink); }

  /* move — a before-bed sequence */
  .move { padding:8px 0 100px; }
  .movetitle { font-size:26px; margin:6px 0 6px; }
  .movesub { color:var(--dim); font-size:16px; line-height:1.5; margin-bottom:22px; }
  .movelist { list-style:none; margin:0; padding:0; }
  .movelist li { display:flex; justify-content:space-between; align-items:baseline; padding:11px 0; border-bottom:1px solid var(--line); }
  .movelist li em { color:var(--dim2); font-style:normal; font-size:13px; letter-spacing:.08em; }
  .player { min-height:72vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:6vw 4vw; }
  .pstepno { color:var(--dim2); font-size:12px; letter-spacing:.22em; text-transform:uppercase; margin-bottom:18px; }
  .pstep { font-size:clamp(1.8rem, 5vw + 1rem, 2.6rem); margin-bottom:14px; }
  .pcue { color:var(--dim); font-size:18px; max-width:20em; line-height:1.5; margin-bottom:26px; }
  .pcount { font-size:15px; letter-spacing:.2em; color:var(--dim2); margin-bottom:20px; }
  .pbar { width:min(62vw, 20em); height:2px; background:var(--line); border-radius:2px; overflow:hidden; }
  .pfill { height:100%; width:0; background:var(--accent); transition:width 1s linear; }

  /* daily prompt + stillness, in the compose view */
  .stillline { color:var(--dim2); font-style:italic; font-size:14px; letter-spacing:.02em; margin-bottom:24px; transition:opacity 1.2s; }
  .dayprompt { color:var(--dim); font-style:italic; font-size:19px; line-height:1.5; border-left:2px solid var(--line); padding-left:16px; margin-bottom:14px; transition:opacity .5s; }
  .promptctl { display:flex; gap:22px; margin-bottom:24px; }
  .promptctl button { background:none; border:none; color:var(--dim2); font-family:inherit; font-size:13px; letter-spacing:.08em; cursor:pointer; padding:0; transition:color .3s; }
  .promptctl button:hover { color:var(--ink); }

  /* the stillness breath, brought in */
  .sitover { position:fixed; inset:0; background:var(--bg); display:none; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; opacity:0; transition:opacity 1.4s ease; z-index:70; }
  .sitover.on { display:flex; } .sitover.vis { opacity:1; }
  .sitorb { width:38vmin; height:38vmin; border-radius:50%; background:radial-gradient(circle at 50% 45%, #2b271f 0%, #1a1712 70%); box-shadow:0 0 14vmin 2vmin rgba(233,226,212,.05); animation:breathe 11s ease-in-out infinite; }
  .sitcue { margin-top:3.2em; color:var(--dim); font-size:1rem; letter-spacing:.34em; text-transform:lowercase; animation:cue 11s ease-in-out infinite; }
  .sitleave { position:fixed; left:0; right:0; bottom:calc(2em + env(safe-area-inset-bottom)); text-align:center; color:var(--dim2); font-size:.78rem; letter-spacing:.22em; text-transform:lowercase; }
  @keyframes breathe { 0%,100%{transform:scale(.72)} 45%{transform:scale(1.12)} 50%{transform:scale(1.12)} 95%{transform:scale(.72)} }
  @keyframes cue { 0%,4%{opacity:0} 8%,42%{opacity:1} 48%,52%{opacity:0} 58%,92%{opacity:1} 97%,100%{opacity:0} }
  @media (prefers-reduced-motion: reduce) { .sitorb,.sitcue{animation:none} .sitcue{opacity:1} }
</style>
</head>
<body>
<div class="wrap">
  <main id="view"></main>
</div>

</div>

<div class="toast" id="toast"></div>

  <div class="sitorb"></div>
  <div class="sitcue" id="sitCue">in</div>

</div>

"body": "I feel most myself, by myself, with no demands on me. Free to let my mind wander and explore. To think or no think. To walk without any direction. Where there are no demands or expectations. When I have no goal in mind. Just spaciousness and time. An open horizon. A clear morning with a blue horizon or the beach. Without the need to complete a task or the need to talk to anyone if I don't have to. With a clear internal horizon, no demands on me. I feel most like a performance in my work, where there are hundreds of people. I am expected in act in the role as a leader. To project and command. Where I would rather just let things be. Where I can just engage with the people as they are. Where there is always urgency, and no reflection.\n\nThere are aspects of my work that can be engaging. There is a sense of movement that comes rom growing in a role, of facing new challenges and overcoming them. I think of public speaking, how much my response to that has changed. Gone is the time when I would almost be beside myself of angst, and now I feel very comfortable and at ease with that. That has been a real change.\n\nBut I feel worn down with the pressure and demands. The constant flow of high stakes moments that cause stress. I am away to step away from those and live in a way that is less full them. That is not authentic. Navigating that change is really challenging. I wonder often now whether that it is the pressure that I put on myself, the constant critique that creates the crowding in, the pressure. Whether it is possible to create the feeling of spaciousness in these current circumstances. Whether changing, stopping work, being free of that things that currently worry me. Whether than would really give me the freedom, I think it would"

"body": "I remember that small room. I remember the holes in the wall from the door being swing open. Was that me, or my mother Jan. I remember the hot feeling of her jug cord hitting my legs.I remember the hot nights, tossing and turning, getting up to the toilet.\n\nI remember that wide desk. So wide I couldn't reach for the book. I stacked my books in neat piles. It was my space, cleanly organized. I remember the computer and the excitement of the prospect of the computer. I read those books, the study guides, immersed in them, and feeling of having read them. Whizzing through the pages, answering the questions, holding my breath at the prospect of getting all the study questions correct. The affirmation. There were windows in front of me, the view outside to the small garden and then across to the row of roses and gravelly driveway. The excitement of getting lost in this work, of being good at of having a something to do well. \n\nWhat were you protecting yourself from? \n\nI was trying to work out who I was. There was nothing that I felt good at, and this was something I could do well. That amazed people. I was by myself, but that was ok. I could whizz through all these things, and people liked me for it. My mum liked, my dad liked me. They didn't understand it, but they liked me doing. It was simpler, my brain could run around. Find fun things to do with. It make me feel ok. I was protecting myself from being alone and I was connecting with something that was me, when everything else felt good. And it helped me escape my mum a bit. I didn't know what I was meant to do, but here was something I could do, that I was good at\n\nWhat did you get that you weren't getting?\n\nIt was my space. Something that I was good at. I wasn't awkward. It was satisfying. It was exciting, so many new things to learn and direct my energy towards.\n\nWhat do you still want from me?\n\nI want you to be happy, I don't want you to feel like you need to look after to me anymore. I was sad, but I don't think you should be. I don't think you need to prove anything to make them love you. I was ok alone. You are to. I think you made it there, you can relax now. Love you. \n\nMark - you did so well, I am so proud of you. You carried me so far. You worked so hard, and felt so alone. But I am hear with you. I am amazed by you and everything you achieved. You gave some much of your self to it. You can rest now."

basically 20. This life here, away from my family home, the kids are here. A strange combination of things of the past, and things that are different. It feels a lot the same. Lucy is here, Sarah is not. Love is here, lots of the uncertainty is not. What were we, here and I? For so long, the nothing. What did we do? It feels like a void. A ticker tape of repeating days. Not going any where. There was no meaning, no happiness, boredom, left alone. Held here. I was to blame? Never enough. Always failing. A counterpoint to this Saturday. A long list of chores to tick off in my head. Just to get back to zero. A no appreciate. She was out. presumably to talk to him. You can come if you want? if you must, if you like? I am not asking. Meanwhile in Christchurch her another live. Living in them both. But I was living another live as well. The other one in my head. Now I want to show her that I am happy by myself, nothing depends on her. I don't need her. Stay away from me. So long it was shit. She treated me like crap. All those years I tried. I could be hard, but she never talked. All I need some some care, empathy, interest. But she just talked about herself. Those shoulders are back, no longer they hover. I am exercising something or just making it worse"

"body": "I build a career, in technology. I built a brand as a calm, smart and authentic leader. Someone who could understand things well. Who was respectable and a supporter of people. I could solve problems and communicate. I was smart thoughtful, successful, I was a little different than most people, a thinker, a reader, an intellectual in a technical word. People respected me. I was strong, I led well, I saw things clearly. I succeed effortlessly, even reluctantly. I worked at one of the coolest companies in New Zealand. People were interested in that. I learnt a lot. I earnt money. More than most. I was proud of my success. It surprised me that I was go at this. It happened wherever I went to work. Without much a plan, successful would come. It flowed. Successful flowed. I liked it. The esteem, the affirmation, the respect.  It was complicated though. I felt uneasy, like I was wearing someone else coat. It made me anxious. I am not clear why. I knew that is fickle in a way, because it came without plan or control, that it could pass just as easily. Leave me. There was a degree of acting in some parts of it. There was no role model. Just a character in my head that I thought I had to play. That was wearing. It tired me out. It made me frustrated. I sought to find issue with others, maybe a redirection.  \n\nMy family - the other container a built. That was clearer. There was less of the effortless progress there. More confusion, and frustration. Frustration with the lack of respect and acknowledgment. A crushing, claustrophobic feeling. A feeling of working without the reward of acknowledgement. Of being angry, under-appreciated. Of needing to recharge from my work, but of it taking more of me. There was a sense of pride my kids, but also an unease and a disconnect."

  "The mountain has never once tried to be a mountain.",
  "You are looking for the ox while riding it.",
  "The crack is where you thought the wall was solid.",
  "Who was breathing before you noticed the breath?",
  "The moon does not argue with the water that holds it.",
  "Put down the argument. See what was holding it up.",
  "A door with no house around it is still a door.",
  "The question dissolves the moment you stop needing an answer.",
  "What was your name before your mother gave you one?",
  "The wave was never separate from the ocean it feared losing.",
  "Snow falling on snow — who is counting?",
  "Look, before the word for it arrives.",
  "There is no one here to fix this. Only this.",
  "The story ends the moment you stop telling it.",
  "What is here, when you stop asking what is here?",
  "Some stillness now."
];

/* the deeper inquiry prompts (Hollis · Shukman · Packer) — brought in on request */
const DEEP_POOL = [].concat(
  LENS_PROMPTS["Hollis — Depth Psychology"],
  LENS_PROMPTS["Shukman — Zen & Opening"],
  LENS_PROMPTS["Packer — Direct Inquiry"]
);

function arcAt(i){ const n=ROHR_ARC.length; return ROHR_ARC[((i%n)+n)%n]; }

/* ============ storage ============ */
const K_ENTRIES = "innerwork2_entries";
const K_REFL = "innerwork2_refl";
const K_KEY = "innerwork2_apikey";
const K_ARC = "innerwork2_arc";
const K_DRAFT = "innerwork2_draft";
/* live draft — the in-progress entry, saved on every keystroke so nothing is ever lost */
function getDraft(){ try { return JSON.parse(localStorage.getItem(K_DRAFT)||"null"); } catch(e){ return null; } }
function setDraft(d){ try { localStorage.setItem(K_DRAFT, JSON.stringify(d)); } catch(e){} }
function clearDraft(){ localStorage.removeItem(K_DRAFT); }
function todayLocal(){ const d=new Date(), p=n=>String(n).padStart(2,"0"); return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate()); }
/* where you are in the writing arc. Default 5 = the start of the fall,
   since the container-and-its-cost prompts (0–4) are already behind you.
   Advances by one each time you keep an entry. */
function getArc(){ const v=localStorage.getItem(K_ARC); return v===null?5:(parseInt(v,10)||0); }
function setArc(i){ const n=ROHR_ARC.length; localStorage.setItem(K_ARC, String(((i%n)+n)%n)); }

function loadEntries() {
  try {
    const raw = localStorage.getItem(K_ENTRIES);
    if (raw) return JSON.parse(raw);
  } catch(e){}
  // first run — seed from the migrated journal
  const seeded = SEED.map((e,i) => Object.assign({ id:"seed-"+i }, e));
  localStorage.setItem(K_ENTRIES, JSON.stringify(seeded));
  return seeded;
}
function saveEntries(list){ localStorage.setItem(K_ENTRIES, JSON.stringify(list)); }
function getRefl(){ try { return JSON.parse(localStorage.getItem(K_REFL)||"{}"); } catch(e){ return {}; } }
function setRefl(id, mode, text){ const c=getRefl(); c[id+"::"+mode]=text; localStorage.setItem(K_REFL, JSON.stringify(c)); }
function apiKey(){ return localStorage.getItem(K_KEY)||""; }

let entries = loadEntries();

/* ============ helpers ============ */
const view = document.getElementById("view");
function esc(s){ return (s||"").replace(/[&<>]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }
function fmtDate(iso){
  const [y,m,d]=iso.split("-").map(Number);
  const MON=["January","February","March","April","May","June","July","August","September","October","November","December"];
  return `${d} ${MON[m-1]} ${y}`;
}
function firstLine(body){ const t=(body||"").trim().replace(/\s+/g," "); return t.slice(0,140); }
function paras(text){ return (text||"").split(/\n\s*\n/).map(p=>p.trim()).filter(Boolean); }
function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("on"); clearTimeout(window._tt); window._tt=setTimeout(()=>t.classList.remove("on"),1600); }
function entTs(e){ const m=String(e.id||"").match(/^e-(\d+)/); return m?parseInt(m[1],10):0; }
function sortedEntries(){ return [...entries].sort((a,b)=> (b.date||"").localeCompare(a.date||"") || (entTs(b)-entTs(a)) ); }

/* light markdown for reflections */
function renderMd(text){
  const lines = esc(text).split("\n");
  const LABELS = ["REFLECTION","GUIDANCE","PRACTICE","A QUESTION TO SIT WITH","PATTERNS","WHAT THE PSYCHE IS WORKING ON"];
  let html="", buf=[];
  const flush=()=>{ if(buf.length){ html+="<p>"+buf.join(" ")+"</p>"; buf=[]; } };
  for(let raw of lines){
    const line=raw.trim();
    if(line===""){ flush(); continue; }
    if(line.startsWith("## ")){ flush(); html+="<h3>"+line.slice(3)+"</h3>"; continue; }
    if(LABELS.includes(line)){ flush(); html+='<div class="label">'+line+"</div>"; continue; }
    buf.push(line);
  }
  flush();
  return html.replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>");
}

/* ============ views ============ */
let _landIdx = Math.floor(Math.random()*STILL_LINES.length);
function renderLanding(){
  view.innerHTML = `
    <div class="land"><div class="landquote" id="landQuote">${esc(STILL_LINES[_landIdx])}</div></div>
    <div class="landbar">
      <button id="lWrite">write</button>
      <button id="lAnother">another</button>
      <button id="lSit">sit</button>
      <button id="lMove">move</button>
      <button id="lEntries">entries</button>
    </div>`;
  const q=document.getElementById("landQuote");
  document.getElementById("lAnother").addEventListener("click",()=>{
    let i; do { i=Math.floor(Math.random()*STILL_LINES.length); } while(i===_landIdx && STILL_LINES.length>1);
    _landIdx=i; q.classList.add("fade"); setTimeout(()=>{ q.textContent=STILL_LINES[_landIdx]; q.classList.remove("fade"); },1000);
  });
  document.getElementById("lWrite").addEventListener("click",()=>renderCompose(null));
  document.getElementById("lSit").addEventListener("click",openSit);
  document.getElementById("lMove").addEventListener("click",renderMove);
  document.getElementById("lEntries").addEventListener("click",renderList);
  window.scrollTo(0,0);
}

function renderList(){
  const list = sortedEntries();
  let rows = list.map(e=>`
    <div class="entry-row" data-id="${e.id}">
      <div class="d">${fmtDate(e.date)}${e.lens?` &nbsp;·&nbsp; <span class="lenspill">${esc(e.lens)}</span>`:""}</div>
      <div class="t">${esc(e.title)}</div>
      <div class="s">${esc(firstLine(e.body)||e.prompt||"—")}</div>
    </div>`).join("");
  if(!list.length) rows = `<div class="empty">Nothing kept yet.</div>`;
  view.innerHTML = `<div class="listhead"><button data-land>← back</button><button id="listAll">everything</button><button id="listSettings">settings</button></div>` + rows;
  view.querySelector("[data-land]").addEventListener("click",renderLanding);
  view.querySelector("#listAll").addEventListener("click",renderOpen);
  view.querySelector("#listSettings").addEventListener("click",openSettings);
  view.querySelectorAll(".entry-row").forEach(r=> r.addEventListener("click",()=>renderRead(r.dataset.id)));
  window.scrollTo(0,0);
}

function renderRead(id){
  const e = entries.find(x=>x.id===id); if(!e) return renderList();
  const cache = getRefl();
  const bodyHtml = paras(e.body).map(p=>`<p>${esc(p)}</p>`).join("") || `<p style="color:var(--dim)"><em>No entry written yet.</em></p>`;
  view.innerHTML = `
    <button class="back" data-home>← entries</button>
    <div class="read">
      <div class="d">${fmtDate(e.date)}${e.lens?` &nbsp;·&nbsp; <span class="lenspill">${esc(e.lens)}</span>`:""}</div>
      <h1>${esc(e.title)}</h1>
      ${e.prompt?`<div class="prompt">${esc(e.prompt)}</div>`:""}
      <div class="body">${bodyHtml}</div>
      <div class="actions">
        <button data-reflect="journey">reflect</button>
        <button data-reflect="council">council</button>
        <span class="spacer"></span>
        <button data-edit>edit</button>
        <button data-del>delete</button>
      </div>
      <div id="reflArea"></div>
    </div>`;
  view.querySelector("[data-home]").addEventListener("click",renderList);
  view.querySelector("[data-edit]").addEventListener("click",()=>renderCompose(e.id));
  view.querySelector("[data-del]").addEventListener("click",()=>{
    if(confirm("Delete this entry?")){ entries=entries.filter(x=>x.id!==id); saveEntries(entries); renderList(); }
  });
  view.querySelectorAll("[data-reflect]").forEach(b=> b.addEventListener("click",()=>reflect(e, b.dataset.reflect)));
  // show any cached reflection
  const jc=cache[id+"::journey"], cc=cache[id+"::council"];
  if(cc) showRefl(e,"council",cc,true); else if(jc) showRefl(e,"journey",jc,true);
  window.scrollTo(0,0);
}

function showRefl(e, mode, text, cached){
  const area=document.getElementById("reflArea"); if(!area) return;
  const who = mode==="council" ? "The Council" : "Journey Reflection";
  area.innerHTML = `<div class="refl"><div class="who">${who}${cached?" · saved":""}</div><div class="md" id="reflMd">${renderMd(text)}</div></div>`;
  return document.getElementById("reflMd");
}

async function streamAnthropic(sys, userMsg, maxTokens, md){
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{ "x-api-key":apiKey(), "anthropic-version":"2023-06-01",
      "anthropic-dangerous-direct-browser-access":"true", "content-type":"application/json" },
    body: JSON.stringify({ model:"claude-opus-4-8", max_tokens:maxTokens, stream:true,
      system: sys, messages:[{role:"user", content:userMsg}] })
  });
  if(!res.ok){ const err=await res.json().catch(()=>({})); throw new Error(err.error?.message || ("API error "+res.status)); }
  const reader=res.body.getReader(); const dec=new TextDecoder(); let carry="", acc="";
  while(true){
    const {done,value}=await reader.read(); if(done) break;
    carry += dec.decode(value,{stream:true});
    const lines=carry.split("\n"); carry=lines.pop();
    for(const line of lines){
      if(!line.startsWith("data: ")) continue;
      const data=line.slice(6); if(data==="[DONE]") continue;
      try{ const ev=JSON.parse(data);
        if(ev.type==="content_block_delta" && ev.delta?.type==="text_delta"){ acc+=ev.delta.text; md.innerHTML=renderMd(acc); }
      }catch(_){}
    }
  }
  return acc;
}

async function reflect(e, mode){
  const key=apiKey();
  if(!key){ openSettings(); toast("Add your API key first"); return; }
  if(!(e.body||"").trim()){ toast("Nothing written to reflect on yet"); return; }
  const md = showRefl(e, mode, "", false); md.classList.add("caret");
  const sys = mode==="council" ? COUNCIL_SYSTEM : JOURNEY_SYSTEM;
  const userMsg = (e.prompt? "Prompt: "+e.prompt+"\n\n" : "") + e.body;
  try {
    const acc = await streamAnthropic(sys, userMsg, 2048, md);
    md.classList.remove("caret");
    md.innerHTML = renderMd(acc);
    setRefl(e.id, mode, acc);
  } catch(err){
    md.classList.remove("caret");
    md.innerHTML = `<p style="color:#c98">Couldn't reach Anthropic: ${esc(err.message)}</p>`;
  }
}

/* ============ open reflection — the whole journal, no set form ============ */
function renderOpen(){
  const list = sortedEntries().filter(e=>(e.body||"").trim()).reverse(); // oldest first
  const cached = getRefl()["all::open"];
  view.innerHTML = `
    <button class="back" data-home>← entries</button>
    <div class="read">
      <div class="d">the whole journal &nbsp;·&nbsp; ${list.length} entries</div>
      <div id="reflArea"></div>
      <div class="actions"><button id="openAgain">again</button></div>
    </div>`;
  view.querySelector("[data-home]").addEventListener("click",renderList);
  const area=document.getElementById("reflArea");
  const show=(text,saved)=>{
    area.innerHTML=`<div class="refl"><div class="who">Open Reflection${saved?" · saved":""}</div><div class="md" id="reflMd">${renderMd(text)}</div></div>`;
    return document.getElementById("reflMd");
  };
  const go=async()=>{
    const key=apiKey();
    if(!key){ openSettings(); toast("Add your API key first"); return; }
    if(!list.length){ toast("Nothing written yet"); return; }
    const md=show("",false); md.classList.add("caret");
    const userMsg=list.map(e=>`--- ENTRY: ${e.date}${e.title?" — "+e.title:""} ---\n`+(e.prompt?`Prompt: ${e.prompt}\n\n`:"")+e.body).join("\n\n");
    try{
      const acc=await streamAnthropic(OPEN_SYSTEM, userMsg, 4000, md);
      md.classList.remove("caret");
      md.innerHTML=renderMd(acc);
      setRefl("all","open",acc);
    }catch(err){
      md.classList.remove("caret");
      md.innerHTML=`<p style="color:#c98">Couldn't reach Anthropic: ${esc(err.message)}</p>`;
    }
  };
  document.getElementById("openAgain").addEventListener("click",go);
  if(cached) show(cached,true); else go();
  window.scrollTo(0,0);
}

function renderCompose(editId, startPrompt){
  const editing = editId ? entries.find(x=>x.id===editId) : null;
  const stillLine = STILL_LINES[Math.floor(Math.random()*STILL_LINES.length)];
  const draft = !editing ? getDraft() : null;
  const openingPrompt = editing ? (editing.prompt||"Write freely.")
    : (draft && draft.prompt) ? draft.prompt
    : (startPrompt!=null ? startPrompt : arcAt(getArc()));
  const openingBody = editing ? editing.body : (draft && draft.body ? draft.body : "");
  view.innerHTML = `
    <button class="back" data-home>← ${editing?"cancel":"back"}</button>
    <div class="compose">
      <div class="stillline">${stillLine}</div>
      <div class="dayprompt" id="cPrompt">${esc(openingPrompt)}</div>
      <div class="promptctl">
        <button id="cAnother">another</button>
        <button id="cDeeper">a reflection prompt</button>
      </div>
      <textarea id="cBody" placeholder="Write freely…">${esc(openingBody)}</textarea>
      <div class="row">
        <button class="btn" id="cSave">${editing?"save":"keep"}</button>
        <button class="btn ghost" data-home>discard</button>
      </div>
    </div>`;
  view.querySelectorAll("[data-home]").forEach(b=>b.addEventListener("click",renderLanding));
  const promptEl=document.getElementById("cPrompt");
  const fade=(txt)=>{ promptEl.style.opacity="0"; setTimeout(()=>{ promptEl.textContent=txt; promptEl.style.opacity="1"; },300); };
  const bodyEl=document.getElementById("cBody");
  const saveDraft=()=>{ if(!editing) setDraft({ body:bodyEl.value, prompt:promptEl.textContent, at:Date.now() }); };
  bodyEl.addEventListener("input",saveDraft);
  let ptr=getArc(), onArc=!editing;
  document.getElementById("cAnother").addEventListener("click",()=>{ ptr++; onArc=true; setArc(ptr); fade(arcAt(ptr)); setTimeout(saveDraft,350); });
  document.getElementById("cDeeper").addEventListener("click",()=>{ onArc=false; fade(DEEP_POOL[Math.floor(Math.random()*DEEP_POOL.length)]); setTimeout(saveDraft,350); });
  document.getElementById("cSave").addEventListener("click",()=>{
    const body=bodyEl.value.trim();
    if(!body){ toast("Nothing to keep yet"); return; }
    const prompt=promptEl.textContent.trim();
    if(editing){
      Object.assign(editing,{ body, prompt });
    } else {
      const now=new Date();
      const title=now.toLocaleDateString("en-NZ",{weekday:"long",day:"numeric",month:"long"});
      entries.push({ id:"e-"+Date.now(), date:todayLocal(), lens:"", title, prompt, body });
    }
    if(onArc && !editing) setArc(ptr+1);   // move the arc forward — what comes next
    saveEntries(entries);
    clearDraft();
    toast("Kept");
    renderLanding();
  });
  window.scrollTo(0,0);
  document.getElementById("cBody").focus();
}

/* ============ move — a 20-minute before-bed sequence ============ */
const MOVE_SEQ = [
  { name:"Arrive",            cue:"Stand tall, soft knees. Let the breath slow. Feel the floor under you.", secs:90 },
  { name:"Sway",              cue:"Rock gently side to side, then forward and back. Loosen the edges.",      secs:60 },
  { name:"Neck & shoulders",  cue:"Slow shoulder rolls. Then let the head drift, ear toward shoulder.",      secs:75 },
  { name:"Forward fold",      cue:"Hinge and hang. Bend the knees. Let the head be heavy.",                  secs:75 },
  { name:"Roll up & reach",   cue:"Stack up slowly, one vertebra at a time. Reach overhead. Open the chest.", secs:45 },
  { name:"Cat & cow",         cue:"On all fours. Arch on the inhale, round on the exhale. Follow the breath.", secs:90 },
  { name:"Child's pose",      cue:"Hips to heels, arms forward. Breathe into your back. Let it widen.",       secs:90 },
  { name:"Thread the needle", cue:"Reach one arm under, shoulder toward the floor. Rest. Then the other side.", secs:90 },
  { name:"Low lunge",         cue:"One foot forward, sink the hips. Soften the front of the body. Then switch.", secs:120 },
  { name:"Seated fold",       cue:"Legs long, fold from the hips. Not reaching for anything. Just leaning in.", secs:75 },
  { name:"Supine twist",      cue:"On your back, drop both knees to one side. Rest there. Then the other.",    secs:120 },
  { name:"Knees to chest",    cue:"Hug the knees in. Rock slowly along the length of the spine.",             secs:60 },
  { name:"Legs up",           cue:"Legs up a wall, or resting high. Long, slow exhales — longer than the in-breath.", secs:120 },
  { name:"Stillness",         cue:"Lie flat. Nothing to do. Let the breath find its own way. You can stay as long as you like.", secs:90 }
];
function mmss(s){ const m=Math.floor(s/60), r=s%60; return m+":"+String(r).padStart(2,"0"); }
function chime(){
  try {
    const AC=window.AudioContext||window.webkitAudioContext; if(!AC) return;
    const ctx=chime.ctx||(chime.ctx=new AC()); if(ctx.state==="suspended") ctx.resume();
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.type="sine"; o.frequency.value=432; o.connect(g); g.connect(ctx.destination);
    const t=ctx.currentTime;
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.05,t+0.06); g.gain.exponentialRampToValueAtTime(0.0001,t+1.1);
    o.start(t); o.stop(t+1.15);
  } catch(e){}
}

function renderMove(){
  const total = Math.round(MOVE_SEQ.reduce((a,s)=>a+s.secs,0)/60);
  const items = MOVE_SEQ.map(s=>`<li><span>${esc(s.name)}</span><em>${mmss(s.secs)}</em></li>`).join("");
  view.innerHTML = `
    <div class="move">
      <div class="movetitle">Before sleep</div>
      <div class="movesub">A slow ${total} minutes to bring the body down for the night. Move gently, breathe, and stop whenever you need to. Best in low light, on the floor.</div>
      <ol class="movelist">${items}</ol>
    </div>
    <div class="landbar">
      <button id="mBegin">begin</button>
      <button id="mBack">back</button>
    </div>`;
  document.getElementById("mBegin").addEventListener("click",startMove);
  document.getElementById("mBack").addEventListener("click",renderLanding);
  window.scrollTo(0,0);
}

let _mv=null;
function startMove(){
  _mv={ idx:0, rem:MOVE_SEQ[0].secs, elapsed:0, paused:false, timer:null,
        total:MOVE_SEQ.reduce((a,s)=>a+s.secs,0) };
  view.innerHTML = `
    <div class="player">
      <div class="pstepno" id="pNo"></div>
      <div class="pstep" id="pStep"></div>
      <div class="pcue" id="pCue"></div>
      <div class="pcount" id="pCount"></div>
      <div class="pbar"><div class="pfill" id="pFill"></div></div>
    </div>
    <div class="landbar">
      <button id="pPause">pause</button>
      <button id="pNext">next</button>
      <button id="pEnd">end</button>
    </div>`;
  document.getElementById("pPause").addEventListener("click",()=>{
    _mv.paused=!_mv.paused; document.getElementById("pPause").textContent=_mv.paused?"resume":"pause";
  });
  document.getElementById("pNext").addEventListener("click",()=>advanceMove(true));
  document.getElementById("pEnd").addEventListener("click",()=>endMove(false));
  showStep();
  chime();
  _mv.timer=setInterval(()=>{
    if(_mv.paused) return;
    _mv.rem--; _mv.elapsed++;
    if(_mv.rem<=0) advanceMove(false); else paintTime();
  },1000);
  window.scrollTo(0,0);
}
function showStep(){
  const s=MOVE_SEQ[_mv.idx];
  document.getElementById("pNo").textContent=(_mv.idx+1)+" / "+MOVE_SEQ.length;
  document.getElementById("pStep").textContent=s.name;
  document.getElementById("pCue").textContent=s.cue;
  paintTime();
}
function paintTime(){
  const c=document.getElementById("pCount"); if(c) c.textContent=mmss(Math.max(0,_mv.rem));
  const f=document.getElementById("pFill"); if(f) f.style.width=(100*_mv.elapsed/_mv.total)+"%";
}
function advanceMove(manual){
  if(_mv.idx>=MOVE_SEQ.length-1){ endMove(true); return; }
  if(manual){ _mv.elapsed+=Math.max(0,_mv.rem); }
  _mv.idx++; _mv.rem=MOVE_SEQ[_mv.idx].secs; showStep(); chime();
}
function endMove(done){
  if(_mv&&_mv.timer) clearInterval(_mv.timer);
  _mv=null;
  if(done){
    chime();
    view.innerHTML = `<div class="land"><div class="landquote">Rest well.</div></div>
      <div class="landbar"><button id="mDone">back</button></div>`;
    document.getElementById("mDone").addEventListener("click",renderLanding);
  } else renderLanding();
}

function openSettings(){ document.getElementById("apikey").value=apiKey(); settings.classList.add("on"); }
document.getElementById("settingsClose").addEventListener("click",()=>settings.classList.remove("on"));
document.getElementById("settingsSave").addEventListener("click",()=>{

const sitOverlay=document.getElementById("sitOverlay");
const sitCue=document.getElementById("sitCue");
let sitTimer=null;
function openSit(){

  requestAnimationFrame(()=>sitOverlay.classList.add("vis"));
  sitCue.textContent="in";
  clearInterval(sitTimer);
  sitTimer=setInterval(()=>{ sitCue.textContent = sitCue.textContent==="in" ? "out" : "in"; },5500);
}
sitOverlay.addEventListener("click",()=>{
  sitOverlay.classList.remove("vis");
  clearInterval(sitTimer);
  setTimeout(()=>sitOverlay.classList.remove("on"),1400);
});

renderLanding();
