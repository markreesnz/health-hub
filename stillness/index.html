<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#12100e">
<title>&nbsp;</title>
<style>
  :root { --bg:#12100e; --ink:#e9e2d4; --dim:#7c756a; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; margin:0; }
  body {
    background:var(--bg); color:var(--ink);
    font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
    font-weight:400; line-height:1.5;
    display:flex; flex-direction:column;
    min-height:100dvh; overflow:hidden;
    -webkit-user-select:none; user-select:none;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  /* ---- anchor view ---- */
  #stage {
    flex:1; display:flex; align-items:center; justify-content:center;
    padding:8vw; cursor:pointer;
  }
  #line {
    max-width:22em; text-align:center;
    font-size:clamp(1.5rem, 4.4vw + 1rem, 2.6rem);
    letter-spacing:.005em;
    transition:opacity 1.6s ease;
  }
  .fade { opacity:0 !important; }

  /* ---- footer ---- */
  #bar {
    display:flex; justify-content:center; gap:2.4em;
    padding:2.2em 1em calc(2.2em + env(safe-area-inset-bottom));
    font-size:.82rem; letter-spacing:.22em; text-transform:lowercase;
  }
  #bar span { color:var(--dim); cursor:pointer; transition:color .4s; }
  #bar span:hover, #bar span:active { color:var(--ink); }

  /* ---- breathing view ---- */
  #sit {
    position:fixed; inset:0; background:var(--bg);
    display:none; flex-direction:column; align-items:center; justify-content:center;
    cursor:pointer; opacity:0; transition:opacity 1.6s ease;
  }
  #sit.on { display:flex; }
  #sit.vis { opacity:1; }
  #orb {
    width:38vmin; height:38vmin; border-radius:50%;
    background:radial-gradient(circle at 50% 45%, #2b271f 0%, #1a1712 70%);
    box-shadow:0 0 14vmin 2vmin rgba(233,226,212,.05);
    animation:breathe 11s ease-in-out infinite;
  }
  #cue {
    margin-top:3.2em; color:var(--dim);
    font-size:1rem; letter-spacing:.34em; text-transform:lowercase;
    animation:cue 11s ease-in-out infinite;
  }
  #leave {
    position:fixed; left:0; right:0;
    bottom:calc(2em + env(safe-area-inset-bottom));
    text-align:center; color:var(--dim);
    font-size:.78rem; letter-spacing:.22em; text-transform:lowercase;
  }
  @keyframes breathe {
    0%,100% { transform:scale(.72); }
    45%     { transform:scale(1.12); }
    50%     { transform:scale(1.12); }
    95%     { transform:scale(.72); }
  }
  @keyframes cue {
    0%,4%    { opacity:0; }
    8%,42%   { opacity:1; }
    48%,52%  { opacity:0; }
    58%,92%  { opacity:1; }
    97%,100% { opacity:0; }
  }
  @media (prefers-reduced-motion: reduce) {
    #orb, #cue { animation:none; }
    #cue { opacity:1; }
  }
</style>
</head>
<body>

  <div id="stage"><div id="line">There is nothing to do here.</div></div>

  <div id="bar">
    <span id="again">·  another  ·</span>
    <span id="tosit">sit</span>
  </div>

  <div id="sit">
    <div id="orb"></div>
    <div id="cue">in</div>
    <div id="leave">leave whenever you like</div>
  </div>

<script>
  // Lines drawn from the whole journey — the corner desk to the flight back to Nelson.
  // No order to master, nothing to finish. One at a time.
  const LINES = [
    // the container, the false self
    "You were never the one holding it together.",
    "There is someone under the coat. There always was.",
    "The container was not bad — just not true.",
    "Success came without a plan. It was never the thing holding you up.",
    "The role was a coat, not a self. You can take it off.",
    // the chasm, the fear that drove the will to act
    "When you sit near the fear, its pull grows weaker.",
    "The plan is only a wall against the falling. You don't need the wall tonight.",
    "The anxiety is a message from the body. You can listen instead of obey.",
    // the boy at the corner desk
    "The boy at the desk did his job. You can let him rest now.",
    "You carried that boy a long way. You can set him down.",
    "You don't need to prove anything to make them love you.",
    "You were ok alone then. You are ok now.",
    "The panic is a boy still trying to keep his mother alive. He is allowed to stop.",
    "You can rest now.",
    // solitude, the open horizon — your true north
    "You are most yourself with no demands, and an open horizon.",
    "Walk without a direction. Let one thing follow another.",
    "There is a part of you that only wants to run — up a cold river, through the moss. Let it run.",
    "Spaciousness is not earned. It waits on the far side of the list.",
    "To get back to zero was the old religion. There is no list here.",
    // the marriage, the grievance
    "You do not have to be right about the past. Only to let it pass through.",
    "The grievance served once. It is not the enemy. You can still set it down.",
    // the threshold, the cost, the tiredness
    "You have tried on many coats. You can stand here with none.",
    "You are on the threshold. You do not have to know where you are going.",
    "The tiredness is not a failure. It is the body asking to stop.",
    // the release — the flight back, and after
    "The tears are the letting go. It is already happening.",
    "Nothing fills the void, because it was never empty.",
    "You could not fall down here. You have fallen upward.",
    "There is no doing it well. Surrender has no metric.",
    "The world does not rest on your shoulders. It never did.",
    "Let the difficulty itself be the prayer.",
    "When ‘am I doing this right?’ arises — let that be the bell.",
    "You are what remains when everything you do is set down.",
    "Weeping is the first prayer of the second half of life.",
    "Let this tiredness be holy ground. Stop asking it to justify itself.",
    "Let yourself be held, instead of being the one who holds.",
    "Just stop interrupting it.",
    // your own words
    "Can I be with this, without it having to be otherwise?",
    "Some stillness now."
  ];

  const stage = document.getElementById('stage');
  const line  = document.getElementById('line');
  let last = -1;

  function nextLine() {
    let i;
    do { i = Math.floor(Math.random() * LINES.length); } while (i === last && LINES.length > 1);
    last = i;
    line.classList.add('fade');
    setTimeout(() => { line.textContent = LINES[i]; line.classList.remove('fade'); }, 1000);
  }

  stage.addEventListener('click', nextLine);
  document.getElementById('again').addEventListener('click', e => { e.stopPropagation(); nextLine(); });

  // ---- breathing ----
  const sit = document.getElementById('sit');
  const cue = document.getElementById('cue');
  let cueTimer = null;

  function startCue() {
    // mirror the 11s animation: "in" for first half, "out" for second
    const flip = () => { cue.textContent = cue.textContent === 'in' ? 'out' : 'in'; };
    cue.textContent = 'in';
    clearInterval(cueTimer);
    cueTimer = setInterval(flip, 5500);
  }
  function openSit() {
    sit.classList.add('on');
    requestAnimationFrame(() => sit.classList.add('vis'));
    startCue();
  }
  function closeSit() {
    sit.classList.remove('vis');
    clearInterval(cueTimer);
    setTimeout(() => sit.classList.remove('on'), 1600);
    nextLine();
  }
  document.getElementById('tosit').addEventListener('click', e => { e.stopPropagation(); openSit(); });
  sit.addEventListener('click', closeSit);
</script>
</body>
</html>
